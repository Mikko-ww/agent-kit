[project]
name = "self-evolve"
version = "0.1.1"
description = "Self-evolving agent skill toolkit for agent-kit."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "questionary>=2.0,<3.0",
    "typer>=0.12,<1.0",
]

[project.scripts]
agent-kit-plugin = "self_evolve.plugin_cli:main"

[build-system]
requires = ["hatchling>=1.27,<2.0"]
build-backend = "hatchling.build"
