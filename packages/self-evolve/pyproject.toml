[project]
name = "self-evolve"
version = "0.6.5"
description = "Self-evolving agent skill toolkit for agent-kit."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12,<1.0",
]

[project.scripts]
agent-kit-plugin = "self_evolve.plugin_cli:main"

[build-system]
requires = ["hatchling>=1.27,<2.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/self_evolve"]

[tool.hatch.build.targets.wheel.force-include]
"src/self_evolve/templates" = "self_evolve/templates"
"src/self_evolve/scripts" = "self_evolve/scripts"
