[project]
name = "agent-kit-skill-link"
version = "0.1.0"
description = "Skill linking toolkit for agent-kit."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "agent-kit",
    "tomli-w>=1.0,<2.0",
]

[project.entry-points."agent_kit.toolkits"]
skill-link = "agent_kit_skill_link.toolkit:get_toolkit"

[tool.uv.sources]
agent-kit = { workspace = true }

[build-system]
requires = ["hatchling>=1.27,<2.0"]
build-backend = "hatchling.build"
