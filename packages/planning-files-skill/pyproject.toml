[project]
name = "planning-files-skill"
version = "0.1.1"
description = "Import planning-files skills into Codex, Cursor, OpenCode, or generic Agent Skills paths."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12,<1.0",
]

[project.scripts]
agent-kit-plugin = "planning_files_skill.plugin_cli:main"

[build-system]
requires = ["hatchling>=1.27,<2.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/planning_files_skill"]
